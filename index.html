<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <title>Email Prompt Tool</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 15px; background-color: #f4f4f4; }
        .container { display: flex; flex-direction: column; gap: 10px; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        /* Button Styles */
        button { 
            width: 100%; padding: 10px; color: white; 
            border: none; border-radius: 4px; cursor: pointer; font-weight: bold;
        }
        .btn-blue { background: #0078d4; }
        .btn-blue:hover { background: #005a9e; }
        
        .btn-red { background: #d83b01; }
        .btn-red:hover { background: #a42c00; }

        #status { font-size: 12px; margin-top: 10px; padding: 5px; border-radius: 2px; }
        .error { color: #a4262c; background: #fed9cc; }
        .success { color: #107c10; background: #dff6dd; }
    </style>
</head>
<body>
    <div class="container">
        <input type="text" id="userInput1" placeholder="Recipient">
        <input type="text" id="userInput2" placeholder="Reason for cancellation">
        
        <button id="helloBtn" class="btn-blue">Reschedule Meeting</button>
        <button id="goodbyeBtn" class="btn-red">Cancel Meeting</button>
        
        <div id="status">Waiting for Office...</div>
    </div>

    <script>
        const statusDiv = document.getElementById("status");
        const input1 = document.getElementById("userInput1");
        const input2 = document.getElementById("userInput2");

        Office.onReady(function (info) {
            if (info.host === "Outlook" || (Office.context && Office.context.mailbox)) {
                updateStatus("Outlook connection: READY", "success");
                
                // Attach different functions to different buttons
                ///1st rescheduled 2nd cancelled
                document.getElementById("helloBtn").onclick = () => insertText("Additionally, I may be available at a later time today, please let me know if you are available also.");
                document.getElementById("goodbyeBtn").onclick = () => insertText("Additionally, I cannot reschedule the meeting for today. Please let me know another time you are available.");
            } else {
                updateStatus("Error: Not running inside Outlook.", "error");
            }
        });

        function updateStatus(msg, className) {
            statusDiv.innerText = msg;
            statusDiv.className = className;
        }

        // We use one function that accepts a "suffix" to keep the code clean
        function insertText(suffix) {
            const val1 = input1.value.trim();
            const val2 = input2.value.trim();

            if (!val1 && !val2) {
                updateStatus("Please fill in at least one box.", "error");
                return;
            }

            const finalString = "Dear "+
                                val1 + 
                                ",<br/><br/>"+
                                "Unfortunately, I will not be able to make it to our scheduled meeting due to this reason: " + 
                                val2 + 
                                ".<br/>" +
                                suffix +
                                "<br/><br/>" +
                                "Best regards," +
                                "<br/>" +
                                "Ms. D";

            Office.context.mailbox.item.body.setSelectedDataAsync(
                finalString,
                { coercionType: Office.CoercionType.Html },
                function (asyncResult) {
                    if (asyncResult.status === Office.AsyncResultStatus.Failed) {
                        updateStatus("Insert failed: " + asyncResult.error.message, "error");
                    } else {
                        updateStatus("Success!", "success");
                        input1.value = "";
                        input2.value = "";
                    }
                }
            );
        }
    </script>
</body>
</html>
