<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Email Prompt Tool</title>
    <!-- 1. The most important line: Loading the Office API -->
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 15px; }
        input { width: 100%; padding: 8px; margin-bottom: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #0078d4; color: white; border: none; cursor: pointer; }
        #status { color: red; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>
    <input type="text" id="userInput" placeholder="Reason for meeting cancellation...">
    <button id="insertBtn">Insert Text</button>
    <div id="status"></div>

    <script>
        const statusDiv = document.getElementById("status");

        // 2. Wait for Office to initialize
        Office.onReady(function (info) {
            if (info.host === Office.Host.Outlook) {
                statusDiv.innerText = "Outlook connection: READY";
                statusDiv.style.color = "green";
                
                // 3. Attach the event listener ONLY after Office is ready
                document.getElementById("insertBtn").onclick = insertText;
            } else {
                statusDiv.innerText = "Error: Not running inside Outlook.";
            }
        });

        function insertText() {
            const userString = document.getElementById("userInput").value;
            const finalString = "Dear [recipient]I am no longer available at the original decided meeting time, due to this reason: "+ userString;

            // 4. Using the Office API to write to the email
            // We use 'try' to catch the error you saw earlier
            try {
                Office.context.mailbox.item.body.setSelectedDataAsync(
                    finalString,
                    { coercionType: Office.CoercionType.Text },
                    function (asyncResult) {
                        if (asyncResult.status === Office.AsyncResultStatus.Failed) {
                            statusDiv.innerText = "Insert failed: " + asyncResult.error.message;
                        } else {
                            statusDiv.innerText = "Success!";
                            document.getElementById("userInput").value = "";
                        }
                    }
                );
            } catch (err) {
                statusDiv.innerText = "API Error: " + err.message;
                console.error(err);
            }
        }
    </script>
</body>
</html>
