<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <title>Email Prompt Tool</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 15px; background-color: #f4f4f4; }
        .container { display: flex; flex-direction: column; gap: 10px; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { 
            width: 100%; padding: 10px; background: #0078d4; color: white; 
            border: none; border-radius: 4px; cursor: pointer; font-weight: bold;
        }
        button:hover { background: #005a9e; }
        #status { font-size: 12px; margin-top: 10px; padding: 5px; border-radius: 2px; }
        .error { color: #a4262c; background: #fed9cc; }
        .success { color: #107c10; background: #dff6dd; }
    </style>
</head>
<body>
    <div class="container">
        <input type="text" id="userInput1" placeholder="First string...">
        <input type="text" id="userInput2" placeholder="Second string...">
        
        <button id="insertBtn">Insert Combined Text</button>
        <div id="status">Waiting for Office...</div>
    </div>

    <script>
        const statusDiv = document.getElementById("status");
        const input1 = document.getElementById("userInput1");
        const input2 = document.getElementById("userInput2");

        Office.onReady(function (info) {
            // Using the robust check we discussed
            if (info.host === "Outlook" || (Office.context && Office.context.mailbox)) {
                updateStatus("Outlook connection: READY", "success");
                document.getElementById("insertBtn").onclick = insertCombinedText;
            } else {
                updateStatus("Error: Not running inside Outlook.", "error");
            }
        });

        function updateStatus(msg, className) {
            statusDiv.innerText = msg;
            statusDiv.className = className;
        }

        function insertCombinedText() {
            const val1 = input1.value.trim();
            const val2 = input2.value.trim();

            // Logic to combine them - you can change the " - " to a space or newline
            const finalString = "Dear "+val1+",\n\nUnfortunately, I will not be able to make it to our scheduled meeting due to this reason: " + val2 + ".\n\nblah";

            // Ensure we have something to paste
            if (!val1 && !val2) {
                updateStatus("Please fill in at least one box.", "error");
                return;
            }

            // Using the Office API to write to the email body
            Office.context.mailbox.item.body.setSelectedDataAsync(
                finalString,
                { coercionType: Office.CoercionType.Text },
                function (asyncResult) {
                    if (asyncResult.status === Office.AsyncResultStatus.Failed) {
                        updateStatus("Insert failed: " + asyncResult.error.message, "error");
                    } else {
                        updateStatus("Success!", "success");
                        // Optional: Clear both inputs
                        input1.value = "";
                        input2.value = "";
                    }
                }
            );
        }
    </script>
</body>
</html>
