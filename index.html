<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Email Prompt Tool</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <script src="taskpane.js"></script>
    <style>
        body { padding: 10px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        input { width: 100%; margin-bottom: 10px; padding: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #0078d4; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <label for="userInput">Enter your text?:</label>
    <input type="text" id="userInput" placeholder="Type something here...">
    <button id="insertBtn">Insert into Email.</button>
</body>
</html>
