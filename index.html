<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <title>Email Prompt Tool</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 15px; background-color: #f4f4f4; }
        .container { display: flex; flex-direction: column; gap: 10px; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { 
            width: 100%; padding: 10px; background: #0078d4; color: white; 
            border: none; border-radius: 4px; cursor: pointer; font-weight: bold;
        }
        button:hover { background: #005a9e; }
        #status { font-size: 12px; margin-top: 10px; padding: 5px; border-radius: 2px; }
        .error { color: #a4262c; background: #fed9cc; }
        .success { color: #107c10; background: #dff6dd; }
    </style>
</head>
<body>
    <div class="container">
        <input type="text" id="userInput" placeholder="Type your string here...">
        <button id="insertBtn">Insert Text</button>
        <div id="status">Waiting for Office...</div>
    </div>

    <script>
        const statusDiv = document.getElementById("status");
        const inputField = document.getElementById("userInput");

        Office.onReady(function (info) {
            if (info.host === Office.Host.Outlook) {
                updateStatus("Outlook connection: READY", "success");
                document.getElementById("insertBtn").onclick = insertText;
            } else {
                updateStatus("Error: Not running inside Outlook.", "error");
            }
        });

        function updateStatus(msg, className) {
            statusDiv.innerText = msg;
            statusDiv.className = className;
        }

        function insertText() {
            const userString = inputField.value.trim();
            
            if (!userString) {
                updateStatus("Please enter some text first.", "error");
                return;
            }

            const finalString = userString + " Hello World!";

            // Use HTML coercion if you want to preserve formatting, 
            // or Text for plain string insertion.
            Office.context.mailbox.item.body.setSelectedDataAsync(
                finalString,
                { coercionType: Office.CoercionType.Text },
                function (asyncResult) {
                    if (asyncResult.status === Office.AsyncResultStatus.Failed) {
                        updateStatus("Failed: " + asyncResult.error.message, "error");
                    } else {
                        updateStatus("Inserted successfully!", "success");
                        inputField.value = ""; // Clear input
                    }
                }
            );
        }
    </script>
</body>
</html>
